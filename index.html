<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open URL</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 16px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #0969da;
      color: #fff;
    }
    button:hover {
      background-color: #0757ba;
    }
    #preview {
      font-size: 1rem;
      word-break: break-all;
    }
    #qrcode {
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <h1>Open URL</h1>
  <div class="row">
    <input id="urlInput" type="text" placeholder="https://example.com" />
    <button id="openBtn">Open</button>
  </div>
  <div id="preview"></div>
  <div id="qrcode"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.5.2/qrcode.js" crossorigin="anonymous"></script>
  <script>
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('openBtn');
    const preview = document.getElementById('preview');
    const qrcodeDiv = document.getElementById('qrcode');

    let debounceTimer;

    input.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        const val = input.value;
        if (val) {
          const a = document.createElement('a');
          a.href = val;
          a.textContent = val;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          preview.innerHTML = '';
          preview.appendChild(a);
          qrcodeDiv.innerHTML = '';
          try {
            var qr = qrcode(0, 'M');
            qr.addData(val);
            qr.make();
            var img = document.createElement('img');
            img.src = qr.createDataURL(4, 0);
            img.style.width = '200px';
            img.style.height = '200px';
            qrcodeDiv.appendChild(img);
          } catch (e) {
            var msg = document.createElement('p');
            msg.textContent = 'Could not generate QR code.';
            qrcodeDiv.appendChild(msg);
          }
        } else {
          preview.innerHTML = '';
          qrcodeDiv.innerHTML = '';
        }
      }, 300);
    });

    btn.addEventListener('click', function () {
      const val = input.value;
      if (val) {
        window.open(val);
      }
    });
  </script>
</body>
</html>
